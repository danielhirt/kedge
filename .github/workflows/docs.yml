name: Deploy Documentation

on:
  push:
    branches: [main]
    paths:
      - 'docs/book/**'
      - '.github/workflows/docs.yml'

permissions:
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install mdbook
        run: |
          curl -sSL https://github.com/rust-lang/mdBook/releases/download/v0.4.44/mdbook-v0.4.44-x86_64-unknown-linux-gnu.tar.gz | tar xz
          chmod +x mdbook

      - name: Build book
        run: ./mdbook build docs/book

      - uses: actions/upload-pages-artifact@v3
        with:
          path: target/book

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
