name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
          - target: aarch64-pc-windows-msvc
            os: windows-latest

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (unix)
        if: runner.os != 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../kedge-${{ matrix.target }}.tar.gz kedge
          cd ../../..
          shasum -a 256 kedge-${{ matrix.target }}.tar.gz > kedge-${{ matrix.target }}.tar.gz.sha256

      - name: Package (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path target/${{ matrix.target }}/release/kedge.exe -DestinationPath kedge-${{ matrix.target }}.zip
          (Get-FileHash kedge-${{ matrix.target }}.zip -Algorithm SHA256).Hash.ToLower() + "  kedge-${{ matrix.target }}.zip" | Out-File -Encoding ASCII kedge-${{ matrix.target }}.zip.sha256

      - uses: actions/upload-artifact@v4
        with:
          name: kedge-${{ matrix.target }}
          path: kedge-${{ matrix.target }}.*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            kedge-*.tar.gz
            kedge-*.zip
            kedge-*.sha256

  homebrew:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Read checksums
        id: shas
        run: |
          for f in *.sha256; do
            target=$(echo "$f" | sed 's/kedge-//;s/\.tar\.gz\.sha256//;s/\.zip\.sha256//')
            sha=$(awk '{print $1}' "$f")
            echo "${target}=${sha}" >> "$GITHUB_OUTPUT"
          done

      - uses: actions/checkout@v4
        with:
          repository: danielhirt/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap

      - name: Update formula
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          ver="${VERSION#v}"
          cd tap
          cat > Formula/kedge.rb << RUBY
          class Kedge < Formula
            desc "Documentation drift detection and remediation CLI"
            homepage "https://github.com/danielhirt/kedge"
            license "Apache-2.0"
            version "${ver}"

            on_macos do
              on_intel do
                url "https://github.com/danielhirt/kedge/releases/download/${VERSION}/kedge-x86_64-apple-darwin.tar.gz"
                sha256 "${{ steps.shas.outputs.x86_64-apple-darwin }}"
              end
              on_arm do
                url "https://github.com/danielhirt/kedge/releases/download/${VERSION}/kedge-aarch64-apple-darwin.tar.gz"
                sha256 "${{ steps.shas.outputs.aarch64-apple-darwin }}"
              end
            end

            on_linux do
              on_intel do
                url "https://github.com/danielhirt/kedge/releases/download/${VERSION}/kedge-x86_64-unknown-linux-gnu.tar.gz"
                sha256 "${{ steps.shas.outputs.x86_64-unknown-linux-gnu }}"
              end
              on_arm do
                url "https://github.com/danielhirt/kedge/releases/download/${VERSION}/kedge-aarch64-unknown-linux-gnu.tar.gz"
                sha256 "${{ steps.shas.outputs.aarch64-unknown-linux-gnu }}"
              end
            end

            def install
              bin.install "kedge"
            end

            test do
              assert_match "kedge", shell_output("#{bin}/kedge --help")
            end
          end
          RUBY

      - name: Push formula update
        run: |
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/kedge.rb
          git commit -m "Update kedge to ${{ github.ref_name }}"
          git push
