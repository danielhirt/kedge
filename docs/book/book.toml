[book]
title = "kedge"
description = "Documentation drift detection for enterprise codebases"
language = "en"
src = "src"

[build]
build-dir = "../../target/book"

[output.html]
default-theme = "light"
preferred-dark-theme = "navy"
git-repository-url = "https://github.com/danielhirt/kedge"
edit-url-template = "https://github.com/danielhirt/kedge/edit/main/docs/book/src/{path}"
additional-css = ["theme/css/custom.css"]
no-section-label = false
